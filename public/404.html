<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages (MIT)
      // GitHub Pages has no server-side rewrites, so a refresh/deep-link to a
      // client-side route (e.g. /portfolio/x) serves this 404 page. It encodes
      // the requested path into a query string and redirects to index.html,
      // where the snippet in <head> restores the real URL via the History API.
      //
      // pathSegmentsToKeep must match your deploy base path:
      //   0  -> username.github.io  OR a custom domain  (default, matches base "/")
      //   1  -> a project page: username.github.io/REPO-NAME/ (also set VITE_BASE=/REPO-NAME/)
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
